  <line x1="100" y1="100" x2="30" y2="130" stroke="#e4e2ec" stroke-width="3" stroke-linecap="round"/>
  <line x1="100" y1="100" x2="35" y2="70" stroke="#e4e2ec" stroke-width="3" stroke-linecap="round"/>
  <line x1="100" y1="100" x2="68" y2="25" stroke="#e4e2ec" stroke-width="3" stroke-linecap="round"/>

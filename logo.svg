  <circle cx="68" cy="25" r="5" fill="none" stroke="#e4e2ec" stroke-width="2"/>
  <!-- corrupted spoke (top) -->
  <line x1="100" y1="100" x2="100" y2="40" stroke="#e4e2ec" stroke-width="3" stroke-linecap="round"/>
  <path d="M 100,40 C 100,30 105,22 108,18" fill="none" stroke="#a78bfa" stroke-width="2.8" stroke-linecap="round"/>

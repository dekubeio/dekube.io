  <circle cx="160" cy="120" r="2.5" fill="#a78bfa" opacity="0.7"/>
  <circle cx="178" cy="142" r="2" fill="#a78bfa" opacity="0.7"/>
  <circle cx="172" cy="155" r="1.8" fill="#a78bfa" opacity="0.7"/>
  <!-- tentacle 3 (bottom) -->
